<!DOCTYPE html>
<html>
    <head>
	    <!-- Bradley C. Alford CSCE 242 -->
        <title>Assignment 11: JavaScript Classes</title>
        <meta charset="UTF-8">
        <meta name="viewport" content ="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
	<h1>Classes</h1>
	<h2>Music Time</h2>
	<div id="songs"></div>
	<div id="modal" class="w3-modal">
		<div class="w3-modal-content w3-card-4 modal-content-custom">
			<header class="w3-container w3-blue">
				<span onclick="closeModal()" 
					class="w3-button w3-display-topright">&times;</span>
				<h3 id="mTitle"></h3>
				<p id="mArtist"></p>
			</header>
			<div class="w3-container modal-body">
				<div class="video-section">
					<iframe id="mVideo"
						frameborder="0"
						allowfullscreen></iframe>
				</div>
				<div class="info-section">
					<p><b>Album:</b> <span id="mAlbum"></span></p>
					<p><b>Year:</b> <span id="mYear"></span></p>
					<p><b>Genre:</b> <span id="mGenre"></span></p>
				</div>
			</div>
		</div>
	</div>
</body>
<script src="script.js"></script>
</html>
